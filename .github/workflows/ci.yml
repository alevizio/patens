name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        # Baseline lint at v1.0.0-beta — fails only on errors (warnings
        # surface in the report). The handful of remaining errors map
        # back to a pre-existing audit; future PRs should add no new
        # errors. Use `pnpm run lint:fix` locally to autofix.
        run: pnpm exec eslint . --max-warnings 9999

      - name: Type-check (svelte-check)
        run: pnpm exec svelte-check --tsconfig ./tsconfig.json

      - name: Unit tests (vitest)
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          retention-days: 7

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests (playwright)
        env:
          CI: 'true'
        run: pnpm exec playwright test

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
