name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies (pnpm audit)
        # Warns about CVEs in the lockfile. Doesn't block CI on info-level
        # findings — only fails on moderate+ severity so a low-severity
        # advisory in a dev tool doesn't break unrelated PRs. Continue
        # on error so a broken upstream registry doesn't take CI down.
        run: pnpm audit --audit-level=moderate || true
        continue-on-error: true

      - name: Lint (eslint)
        # Baseline ratchet: 0 warnings as of this commit (52 → 47 → 30 → 5
        # → 0). The two intentional patterns that previously sat above the
        # gate (the matches-initial-value pattern in GlyphBrowser and the
        # $state/$effect→$derived shape in spacing) are now suppressed
        # inline with a comment explaining the why, so the project ratchet
        # stays at zero. Any new warning blocks; `pnpm run lint:fix`
        # autofixes the autofixable ones locally.
        run: pnpm exec eslint . --max-warnings 0

      - name: Type-check (svelte-check)
        run: pnpm exec svelte-check --tsconfig ./tsconfig.json

      - name: Unit tests (vitest)
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage
          retention-days: 7

      - name: Build (production)
        run: pnpm exec vite build

      - name: Bundle size budget
        # Budget: 5MB total client output. Current baseline is ~3.9MB
        # (includes ~500KB of self-hosted OG fonts as static assets).
        # 5MB flags real JS bloat without being so tight that adding
        # a new static asset blocks PRs. Inspect via `pnpm run analyze`.
        run: |
          set -e
          BUDGET_KB=5120
          ACTUAL_KB=$(du -sk .svelte-kit/output/client | cut -f1)
          echo "Client bundle: ${ACTUAL_KB} KB (budget: ${BUDGET_KB} KB)"
          if [ "$ACTUAL_KB" -gt "$BUDGET_KB" ]; then
            echo "::error::Bundle size ${ACTUAL_KB}KB exceeds budget of ${BUDGET_KB}KB"
            exit 1
          fi

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests (playwright)
        env:
          CI: 'true'
        run: pnpm exec playwright test

      - name: Upload Playwright trace + report on failure
        # Uploads:
        #   - playwright-report/  → the HTML reporter bundle (open
        #     index.html locally to browse test results + failures).
        #   - test-results/       → trace.zip + screenshots + videos for
        #     every failed test, viewable via `npx playwright show-trace`.
        # `if: failure()` keeps successful runs from uploading an empty
        # artifact every time. 7-day retention is short enough to not
        # cost much, long enough to triage a Monday-morning regression.
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          retention-days: 7

      - name: Generate SBOM (CycloneDX)
        # Software Bill of Materials for downstream auditability +
        # regulatory future-proofing. EU CRA mandates SBOMs for
        # commercial products from December 2027, with vulnerability
        # reporting from September 2026; non-commercial OSS is exempt
        # today but generating one in CI is ~10 seconds of work and
        # the artifact is useful for self-hosters evaluating supply-
        # chain risk + Sponsors / enterprise users.
        #
        # cdxgen produces CycloneDX 1.5 JSON, the OWASP-led spec that's
        # now the cross-tooling default (read by Dependency-Track,
        # Snyk, Sonatype, GitHub's own dependency graph).
        #
        # `--include-formulation` records the build environment + Node
        # version so a future reader can reproduce. The file is
        # deterministic per lockfile so it'll appear in CI artifacts
        # without bloating commits.
        if: always()
        run: pnpm dlx @cyclonedx/cdxgen -t pnpm -o sbom.cdx.json --include-formulation

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx-${{ github.run_id }}
          path: sbom.cdx.json
          retention-days: 90
