<!doctype html>
<!-- The lang placeholder below is replaced per-request in
     hooks.server.ts (en, or es for the /es/* routes) — a hardcoded
     "en" mislabels every Spanish page for screen readers + search. -->
<html lang="%lang%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="color-scheme" content="light dark" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/icon-192.png" />
		<link rel="icon" type="image/png" sizes="512x512" href="%sveltekit.assets%/icon-512.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/icon-192.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<!-- Swiss palette: stone-50 (light) / stone-950 (dark). Match the
		     browser chrome (address bar, system UI) to the page bg so there
		     is no contrast notch when the page mounts. -->
		<meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0c0a09" media="(prefers-color-scheme: dark)" />
		<!-- IBM Plex Sans — primary face per the Swiss design system.
		     Light (300) for display, regular (400) for body, medium (500)
		     for emphasis, semibold (600) reserved for rare strong CTAs.
		     Italic 300/400 carried for rare quoted material.
		     Async-load pattern: media=print fetches the CSS without
		     render-blocking; onload swaps to media=all once the file
		     lands. Plex Sans then takes over from system-ui via the
		     display=swap directive on the @font-face declarations. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
			rel="stylesheet"
			media="print"
			onload="this.media='all'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
				rel="stylesheet"
			/>
		</noscript>
		<style>
			/* Pre-hydration base — minimal stone defaults so the cold-load
			   flash isn't pure white. NOT using light-dark() here: that
			   function keys off `color-scheme`, which our explicit class-based
			   theme toggle would conflict with (class set after hydration
			   trails system preference). Body + tokens are restated by
			   app.css and overridden by .theme-dark once Svelte mounts. */
			html,
			body {
				background: #fafaf9;
				color: #1c1917;
				margin: 0;
			}
			html.theme-dark,
			html.theme-dark body {
				background: #0c0a09;
				color: #fafaf9;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- Pre-hydration skeleton — shown only while the SvelteKit JS bundle
		     is booted (typically <300ms). Once Svelte mounts, the body slot
		     replaces this entirely. -->
		<noscript>
			<div
				style="font-family: 'IBM Plex Sans', system-ui, sans-serif; padding: 4rem 1.5rem; text-align: center; max-width: 32rem; margin: 0 auto;"
			>
				<h1 style="font-size: 28px; font-weight: 300; letter-spacing: -0.02em; margin: 0 0 1rem;">
					Patens
				</h1>
				<p style="font-size: 14px; line-height: 1.5; color: #57534e;">
					This app needs JavaScript to render. Every project is built and stored in your
					browser; there's no server to fall back to.
				</p>
			</div>
		</noscript>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
