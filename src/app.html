<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="theme-color" content="#111111" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: dark)" />
		%sveltekit.head%
	</head>
	<style>
		/* Pre-hydration base — sets the page background to the canvas
		   token's resolved value so the cold-load flash matches the
		   eventual theme instead of going white. The actual token is
		   restated by Svelte once it mounts; this is a defensive shim
		   for the ~100-300ms before hydration. */
		html,
		body {
			background: light-dark(#fafaf9, #0c0c0c);
			color: light-dark(#1a1a1a, #ededed);
			margin: 0;
		}
	</style>
	<body data-sveltekit-preload-data="hover">
		<!--
			Pre-hydration skeleton — shown only while the SvelteKit JS bundle
			is fetched + booted (typically <300ms on a warm cache). Once
			Svelte mounts, the body slot below replaces this entirely. The
			alternative was a white flash, which on the foundry-style share
			pages reads as broken.
		-->
		<noscript>
			<div style="font-family: 'Hoefler Text', ui-serif, Georgia, serif; padding: 4rem 1.5rem; text-align: center; max-width: 32rem; margin: 0 auto;">
				<h1 style="font-size: 28px; margin: 0 0 1rem;">Font Studio</h1>
				<p style="font-size: 14px; line-height: 1.5; color: #666;">
					This app needs JavaScript to render. Every project is built and
					stored in your browser; there's no server to fall back to.
				</p>
			</div>
		</noscript>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
